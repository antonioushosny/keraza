
server {
    listen 80;
    server_name localhost;
    server_name keraza.local;

     # Add this line to allow iframe embedding:
    add_header X-Frame-Options "ALLOWALL";
    add_header Content-Security-Policy "frame-ancestors *";

    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
    client_max_body_size 50M;


    root /var/www/public;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|svg|woff2?|ttf|otf|pdf|mp4|webm|wav|mp3|m4a|aac|oga)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    location ~ \.php$ {
        fastcgi_pass keraza-app:9000;  # This should match the PHP-FPM service name and port
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }


    location ~ /\.ht {
        deny all;
    }

    # Security Headers (optional)
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Frame-Options "SAMEORIGIN";
}

